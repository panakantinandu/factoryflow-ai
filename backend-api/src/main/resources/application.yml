spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/factoryflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Momdad@123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

agent:
  service:
    url: ${AGENT_SERVICE_URL:http://localhost:8000}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.factoryflow: DEBUG
    org.springframework.web: INFO
